<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Interattiva di Sania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-wrapper {
            position: relative;
            display: block;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border: 4px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .map-image {
            display: block;
            width: 100%;
            height: auto;
        }
        .hotspot {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #eab308;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
            transition: transform 0.2s, background 0.2s;
        }
        .hotspot:hover {
            transform: scale(1.4);
            background: #fff;
        }
    </style>
</head>
<body style="
  background-image: url('sfondo\ 8.jpg');
  background-size: auto;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-color: rgb(244, 222, 205);
">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-6">
            <h1 class="text-4xl font-extrabold text-yellow-500">Mappa di Sania</h1>
            <p class="text-slate-400 mt-2">Seleziona un punto di interesse per visualizzare i dettagli.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Colonna Mappa -->
            <div class="lg:col-span-2">
                <div class="map-wrapper" id="map-area">
                    <img src="Sania 2026-06-25-19-26.jpeg" alt="Mappa di Sania" class="map-image">
                    <div id="hotspots-layer"></div>
                </div>
            </div>

            <!-- Colonna Info -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl h-fit">
                <h2 class="text-xl font-semibold text-yellow-500 mb-4">Dettagli Luogo</h2>
                <div id="info-content" class="text-slate-300">
                    <p class="italic">Seleziona un punto sulla mappa per vedere le informazioni qui...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const locations = [
            { id: 1, name: "Capitale", desc: "Il cuore pulsante dell'impero di Sania, sede del trono.", top: 30, left: 40 },
            { id: 2, name: "Porto Antico", desc: "Il principale snodo commerciale per le rotte marittime.", top: 60, left: 70 },
            { id: 3, name: "Fortezza del Nord", desc: "Un'antica roccaforte costruita per proteggere i confini.", top: 20, left: 20 },
            { id: 4, name: "Fortezza del Nord", desc: "Un'antica roccaforte costruita per proteggere i confini.", top: 40, left: 25 },
            { id: 5, name: "Fortezza del Nord", desc: "Un'antica roccaforte costruita per proteggere i confini.", top: 45, left: 30 }
        ];

        const layer = document.getElementById('hotspots-layer');
        const info = document.getElementById('info-content');

        locations.forEach(loc => {
            const div = document.createElement('div');
            div.className = 'hotspot';
            div.style.top = loc.top + '%';
            div.style.left = loc.left + '%';
            
            div.onclick = () => {
                info.innerHTML = `
                    <h3 class="text-2xl font-bold text-white mb-2">${loc.name}</h3>
                    <p>${loc.desc}</p>
                `;
            };
            layer.appendChild(div);
        });
    </script>
</body>
</html>
